openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SENTINELX AI Cybersecurity Intelligence Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: threats
    description: Threat detection and management
  - name: events
    description: Security event log management
  - name: dashboard
    description: Dashboard analytics and summaries
  - name: recommendations
    description: AI security recommendations
  - name: openai
    description: OpenAI AI chat operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /threats:
    get:
      operationId: listThreats
      tags: [threats]
      summary: List all detected threats
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, blocked, investigating, resolved]
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of threats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Threat"
    post:
      operationId: createThreat
      tags: [threats]
      summary: Create a new threat record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThreatInput"
      responses:
        "201":
          description: Created threat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Threat"

  /threats/{id}:
    get:
      operationId: getThreat
      tags: [threats]
      summary: Get a specific threat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Threat details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Threat"
        "404":
          description: Not found
    patch:
      operationId: updateThreatStatus
      tags: [threats]
      summary: Update threat status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThreatStatusUpdate"
      responses:
        "200":
          description: Updated threat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Threat"

  /threats/simulate:
    post:
      operationId: simulateThreat
      tags: [threats]
      summary: Simulate a new cyber attack event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationInput"
      responses:
        "201":
          description: Simulated threat created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Threat"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List security events
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: threatId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of security events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecurityEvent"

  /events/upload:
    post:
      operationId: uploadEventsCsv
      tags: [events]
      summary: Upload CSV log file for analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CsvUploadInput"
      responses:
        "200":
          description: CSV analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvAnalysisResult"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/threat-timeline:
    get:
      operationId: getThreatTimeline
      tags: [dashboard]
      summary: Get threat activity timeline for the last 24 hours
      responses:
        "200":
          description: Timeline data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelinePoint"

  /dashboard/severity-breakdown:
    get:
      operationId: getSeverityBreakdown
      tags: [dashboard]
      summary: Get threat count by severity
      responses:
        "200":
          description: Severity breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeverityCount"

  /dashboard/attack-types:
    get:
      operationId: getAttackTypeBreakdown
      tags: [dashboard]
      summary: Get threat count by attack type
      responses:
        "200":
          description: Attack type breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttackTypeCount"

  /recommendations:
    get:
      operationId: listRecommendations
      tags: [recommendations]
      summary: List AI-generated security recommendations
      responses:
        "200":
          description: List of recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"
    post:
      operationId: generateRecommendations
      tags: [recommendations]
      summary: Trigger AI recommendation generation for current threats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationRequest"
      responses:
        "200":
          description: Generated recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"

  /recommendations/{id}/apply:
    post:
      operationId: applyRecommendation
      tags: [recommendations]
      summary: Mark a recommendation as applied
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a message to the AI security copilot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Threat:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low]
        status:
          type: string
          enum: [active, blocked, investigating, resolved]
        sourceIp:
          type: string
        targetSystem:
          type: string
        description:
          type: string
        aiExplanation:
          type: ["string", "null"]
        aiConfidence:
          type: ["number", "null"]
        mitigationSteps:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        attackVector:
          type: ["string", "null"]
        affectedUsers:
          type: ["integer", "null"]
        detectedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - severity
        - status
        - sourceIp
        - targetSystem
        - description
        - detectedAt
        - updatedAt

    ThreatInput:
      type: object
      properties:
        type:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low]
        sourceIp:
          type: string
        targetSystem:
          type: string
        description:
          type: string
        country:
          type: string
        attackVector:
          type: string
        affectedUsers:
          type: integer
      required:
        - type
        - severity
        - sourceIp
        - targetSystem
        - description

    ThreatStatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [active, blocked, investigating, resolved]
      required:
        - status

    SimulationInput:
      type: object
      properties:
        attackType:
          type: ["string", "null"]
      required: []

    SecurityEvent:
      type: object
      properties:
        id:
          type: integer
        threatId:
          type: ["integer", "null"]
        eventType:
          type: string
        sourceIp:
          type: string
        targetSystem:
          type: string
        severity:
          type: string
        details:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - eventType
        - sourceIp
        - targetSystem
        - severity
        - details
        - timestamp

    CsvUploadInput:
      type: object
      properties:
        csvContent:
          type: string
        filename:
          type: string
      required:
        - csvContent

    CsvAnalysisResult:
      type: object
      properties:
        totalRows:
          type: integer
        threatsDetected:
          type: integer
        criticalCount:
          type: integer
        highCount:
          type: integer
        mediumCount:
          type: integer
        lowCount:
          type: integer
        summary:
          type: string
        threats:
          type: array
          items:
            $ref: "#/components/schemas/Threat"
      required:
        - totalRows
        - threatsDetected
        - criticalCount
        - highCount
        - mediumCount
        - lowCount
        - summary
        - threats

    DashboardSummary:
      type: object
      properties:
        activeThreats:
          type: integer
        blockedThreats:
          type: integer
        criticalAlerts:
          type: integer
        totalEvents:
          type: integer
        threatScore:
          type: number
        aiConfidenceAvg:
          type: number
        suspiciousDevices:
          type: integer
        monitoringStatus:
          type: string
        threatsLast24h:
          type: integer
        resolvedToday:
          type: integer
      required:
        - activeThreats
        - blockedThreats
        - criticalAlerts
        - totalEvents
        - threatScore
        - aiConfidenceAvg
        - suspiciousDevices
        - monitoringStatus
        - threatsLast24h
        - resolvedToday

    TimelinePoint:
      type: object
      properties:
        hour:
          type: string
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        total:
          type: integer
      required:
        - hour
        - critical
        - high
        - medium
        - low
        - total

    SeverityCount:
      type: object
      properties:
        severity:
          type: string
        count:
          type: integer
        percentage:
          type: number
      required:
        - severity
        - count
        - percentage

    AttackTypeCount:
      type: object
      properties:
        type:
          type: string
        count:
          type: integer
      required:
        - type
        - count

    Recommendation:
      type: object
      properties:
        id:
          type: integer
        threatId:
          type: ["integer", "null"]
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [immediate, high, medium, low]
        actionType:
          type: string
        isApplied:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - priority
        - actionType
        - isApplied
        - createdAt

    RecommendationRequest:
      type: object
      properties:
        threatIds:
          type: array
          items:
            type: integer
      required: []

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
